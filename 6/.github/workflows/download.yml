name: comic-download

on:
  workflow_dispatch:
    inputs:
      comic_id:
        description: "comic id"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: install deps
        run: |
          pip install pillow

      - name: run script
        run: |
          python main.py "${{ inputs.comic_id }}"
